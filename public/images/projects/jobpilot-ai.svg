  <text x="500" y="358" text-anchor="middle" fill="#99f6e4" font-size="9">Digest + Inline Keyboards</text>
  <text x="660" y="343" text-anchor="middle" fill="#5eead4" font-size="10">Web Cockpit</text>
  <text x="660" y="358" text-anchor="middle" fill="#99f6e4" font-size="9">FastAPI + SQLAdmin</text>

  <!-- Stats Bar -->
  <rect x="55" y="400" width="690" height="50" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="150" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">1,407</text>
  <text x="150" y="443" text-anchor="middle" fill="#5eead4" font-size="9">tests</text>
  <text x="290" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">6</text>
  <text x="290" y="443" text-anchor="middle" fill="#5eead4" font-size="9">LLM providers</text>
  <text x="430" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">5</text>
  <text x="430" y="443" text-anchor="middle" fill="#5eead4" font-size="9">discovery sources</text>
  <text x="570" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">15</text>
  <text x="570" y="443" text-anchor="middle" fill="#5eead4" font-size="9">DB migrations</text>
  <text x="700" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">7</text>
  <text x="700" y="443" text-anchor="middle" fill="#5eead4" font-size="9">resume templates</text>

  <!-- Footer -->
