  <text x="287" y="257" text-anchor="middle" fill="#0d9488" font-size="11">&#x2192;</text>
  <text x="390" y="257" text-anchor="middle" fill="#0d9488" font-size="11">&#x2192;</text>
  <text x="490" y="257" text-anchor="middle" fill="#0d9488" font-size="11">&#x2192;</text>
  <text x="590" y="257" text-anchor="middle" fill="#0d9488" font-size="11">&#x2192;</text>

