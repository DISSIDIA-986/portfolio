<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#ccfbf1" font-size="20" font-weight="700">JobPilot AI &#x2014; Agentic Job Automation Pipeline</text>
  <line x1="150" y1="48" x2="650" y2="48" stroke="url(#accent)" stroke-width="2"/>

  <!-- Discovery Sources -->
  <rect x="30" y="70" width="160" height="110" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="110" y="93" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Multi-Source Discovery</text>
  <text x="110" y="115" text-anchor="middle" fill="#5eead4" font-size="10">Job Board APIs</text>
  <text x="110" y="133" text-anchor="middle" fill="#5eead4" font-size="10">Email Alert Parsing</text>
  <text x="110" y="151" text-anchor="middle" fill="#5eead4" font-size="10">JD Enrichment</text>
  <text x="110" y="169" text-anchor="middle" fill="#99f6e4" font-size="9">5 sources, auto-scheduled</text>

  <!-- Arrow -->
  <line x1="190" y1="125" x2="230" y2="125" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dedup -->
  <rect x="235" y="85" width="130" height="90" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="300" y="108" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">3-Tier Dedup</text>
  <text x="300" y="128" text-anchor="middle" fill="#5eead4" font-size="10">Exact Match</text>
  <text x="300" y="143" text-anchor="middle" fill="#5eead4" font-size="10">Content Hash</text>
  <text x="300" y="158" text-anchor="middle" fill="#5eead4" font-size="10">Fuzzy Matching</text>

  <!-- Arrow -->
  <line x1="365" y1="125" x2="405" y2="125" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Scoring -->
  <rect x="410" y="70" width="160" height="110" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="490" y="93" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">LLM Scoring</text>
  <text x="490" y="115" text-anchor="middle" fill="#5eead4" font-size="10">Multi-Provider Fallback</text>
  <text x="490" y="133" text-anchor="middle" fill="#5eead4" font-size="10">Circuit Breakers</text>
  <text x="490" y="151" text-anchor="middle" fill="#5eead4" font-size="10">Structured Output</text>
  <text x="490" y="169" text-anchor="middle" fill="#99f6e4" font-size="10">Reflexive Quality Gates</text>

  <!-- Arrow -->
  <line x1="570" y1="125" x2="610" y2="125" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Resume Build -->
  <rect x="615" y="75" width="155" height="100" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="692" y="98" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Resume Tailoring</text>
  <text x="692" y="118" text-anchor="middle" fill="#5eead4" font-size="10">AI Bullet Selection</text>
  <text x="692" y="136" text-anchor="middle" fill="#5eead4" font-size="10">Cover Letter Gen</text>
  <text x="692" y="154" text-anchor="middle" fill="#5eead4" font-size="10">ATS Compliance Check</text>
  <text x="692" y="169" text-anchor="middle" fill="#99f6e4" font-size="9">PII-safe pipeline</text>

  <!-- LLM Provider Row -->
  <rect x="55" y="210" width="690" height="55" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="400" y="232" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">LLM Orchestration Layer</text>
  <text x="170" y="252" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="500">Task Routing</text>
  <text x="325" y="252" text-anchor="middle" fill="#5eead4" font-size="11">Provider Fallback Chain</text>
  <text x="500" y="252" text-anchor="middle" fill="#5eead4" font-size="11">Cost Optimization</text>
  <text x="650" y="252" text-anchor="middle" fill="#5eead4" font-size="11">Observability</text>

  <!-- Auto-Apply Row -->
  <rect x="55" y="290" width="335" height="80" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="222" y="315" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Auto-Apply Engine</text>
  <text x="132" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Email</text>
  <text x="222" y="340" text-anchor="middle" fill="#5eead4" font-size="10">ATS Platforms</text>
  <text x="318" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Browser Automation</text>
  <text x="222" y="358" text-anchor="middle" fill="#99f6e4" font-size="9">Channel router with auto-detection</text>

  <!-- Notifications + Control -->
  <rect x="410" y="290" width="335" height="80" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="577" y="315" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Notifications + Control</text>
  <text x="500" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Telegram Bot</text>
  <text x="500" y="355" text-anchor="middle" fill="#99f6e4" font-size="9">Daily digest + approvals</text>
  <text x="660" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Web Dashboard</text>
  <text x="660" y="355" text-anchor="middle" fill="#99f6e4" font-size="9">Monitoring + management</text>

  <!-- Stats Bar -->
  <rect x="55" y="400" width="690" height="50" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="200" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">1,400+</text>
  <text x="200" y="443" text-anchor="middle" fill="#5eead4" font-size="9">tests</text>
  <text x="400" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">6</text>
  <text x="400" y="443" text-anchor="middle" fill="#5eead4" font-size="9">LLM providers</text>
  <text x="600" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">5</text>
  <text x="600" y="443" text-anchor="middle" fill="#5eead4" font-size="9">discovery sources</text>

  <!-- Footer -->
  <text x="400" y="480" text-anchor="middle" fill="#5eead4" font-size="10">Python + Pydantic + async + circuit breakers + structured LLM output + observability</text>
</svg>
