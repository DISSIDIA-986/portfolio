  <text x="233" y="257" text-anchor="middle" fill="#5eead4" font-size="11">GLM-4.5 Air</text>
  <text x="340" y="257" text-anchor="middle" fill="#5eead4" font-size="11">Qwen3.5</text>
  <text x="440" y="257" text-anchor="middle" fill="#5eead4" font-size="11">DeepSeek</text>
  <text x="540" y="257" text-anchor="middle" fill="#5eead4" font-size="11">Groq</text>
  <text x="640" y="257" text-anchor="middle" fill="#5eead4" font-size="11">Ollama</text>
