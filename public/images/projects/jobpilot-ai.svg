<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#ccfbf1" font-size="20" font-weight="700">JobPilot AI — Agentic Job Automation Pipeline</text>
  <line x1="150" y1="48" x2="650" y2="48" stroke="url(#accent)" stroke-width="2"/>

  <!-- Discovery Sources -->
  <rect x="30" y="70" width="160" height="110" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="110" y="93" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Discovery</text>
  <text x="110" y="112" text-anchor="middle" fill="#5eead4" font-size="10">Adzuna</text>
  <text x="110" y="127" text-anchor="middle" fill="#5eead4" font-size="10">JobBank</text>
  <text x="110" y="142" text-anchor="middle" fill="#5eead4" font-size="10">JSearch</text>
  <text x="110" y="157" text-anchor="middle" fill="#5eead4" font-size="10">Himalayas</text>

  <!-- Arrow -->
  <line x1="190" y1="125" x2="230" y2="125" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dedup -->
  <rect x="235" y="85" width="130" height="80" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="300" y="108" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">3-Tier Dedup</text>
  <text x="300" y="126" text-anchor="middle" fill="#5eead4" font-size="10">URL + Hash + Fuzzy</text>
  <text x="300" y="141" text-anchor="middle" fill="#5eead4" font-size="10">RapidFuzz 85%</text>

  <!-- Arrow -->
  <line x1="365" y1="125" x2="405" y2="125" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Scoring -->
  <rect x="410" y="70" width="160" height="110" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="490" y="93" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">LLM Scoring</text>
  <text x="490" y="112" text-anchor="middle" fill="#5eead4" font-size="10">5 Providers</text>
  <text x="490" y="127" text-anchor="middle" fill="#5eead4" font-size="10">Circuit Breakers</text>
  <text x="490" y="142" text-anchor="middle" fill="#5eead4" font-size="10">Structured Output</text>
  <text x="490" y="157" text-anchor="middle" fill="#5eead4" font-size="10">Reflexive Quality Gates</text>

  <!-- Arrow -->
  <line x1="570" y1="125" x2="610" y2="125" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Resume Build -->
  <rect x="615" y="85" width="155" height="80" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="692" y="108" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Resume Build</text>
  <text x="692" y="126" text-anchor="middle" fill="#5eead4" font-size="10">Bullet Selection</text>
  <text x="692" y="141" text-anchor="middle" fill="#5eead4" font-size="10">DOCX + ATS Check</text>

  <!-- LLM Provider Row -->
  <rect x="80" y="210" width="640" height="55" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="400" y="232" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">LLM Provider Chain (with fallback)</text>
  <text x="160" y="252" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="500">GLM-4.7</text>
  <text x="280" y="252" text-anchor="middle" fill="#5eead4" font-size="11">Qwen</text>
  <text x="390" y="252" text-anchor="middle" fill="#5eead4" font-size="11">DeepSeek</text>
  <text x="500" y="252" text-anchor="middle" fill="#5eead4" font-size="11">GROQ</text>
  <text x="610" y="252" text-anchor="middle" fill="#5eead4" font-size="11">Ollama</text>
  <!-- Arrows between providers -->
  <text x="220" y="252" text-anchor="middle" fill="#0d9488" font-size="11">&rarr;</text>
  <text x="335" y="252" text-anchor="middle" fill="#0d9488" font-size="11">&rarr;</text>
  <text x="445" y="252" text-anchor="middle" fill="#0d9488" font-size="11">&rarr;</text>
  <text x="555" y="252" text-anchor="middle" fill="#0d9488" font-size="11">&rarr;</text>

  <!-- Auto-Apply Row -->
  <rect x="80" y="290" width="310" height="80" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="235" y="315" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Auto-Apply Channels</text>
  <text x="135" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Email</text>
  <text x="205" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Greenhouse</text>
  <text x="285" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Lever</text>
  <text x="345" y="340" text-anchor="middle" fill="#5eead4" font-size="10">Browser</text>
  <text x="235" y="358" text-anchor="middle" fill="#99f6e4" font-size="9">bb-browser (real Chrome via CDP)</text>

  <!-- Telegram Bot -->
  <rect x="410" y="290" width="310" height="80" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="565" y="315" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Telegram Bot</text>
  <text x="565" y="338" text-anchor="middle" fill="#5eead4" font-size="10">Morning Digest + Inline Keyboards</text>
  <text x="565" y="355" text-anchor="middle" fill="#5eead4" font-size="10">[Apply] [Review] [Skip]</text>

  <!-- Stats Bar -->
  <rect x="80" y="400" width="640" height="50" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="180" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">1,250+</text>
  <text x="180" y="443" text-anchor="middle" fill="#5eead4" font-size="9">tests</text>
  <text x="320" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">5</text>
  <text x="320" y="443" text-anchor="middle" fill="#5eead4" font-size="9">LLM providers</text>
  <text x="460" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">4</text>
  <text x="460" y="443" text-anchor="middle" fill="#5eead4" font-size="9">discovery sources</text>
  <text x="610" y="430" text-anchor="middle" fill="#2dd4bf" font-size="14" font-weight="700">13</text>
  <text x="610" y="443" text-anchor="middle" fill="#5eead4" font-size="9">DB migrations</text>

  <!-- Footer -->
  <text x="400" y="480" text-anchor="middle" fill="#5eead4" font-size="10">Python + Pydantic + instructor + stamina + aiobreaker + APScheduler + python-telegram-bot</text>
</svg>
