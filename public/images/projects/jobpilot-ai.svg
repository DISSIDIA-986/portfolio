  <text x="300" y="113" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">3-Tier Dedup</text>
  <text x="300" y="131" text-anchor="middle" fill="#5eead4" font-size="10">URL + Hash + Fuzzy</text>
  <text x="300" y="146" text-anchor="middle" fill="#5eead4" font-size="10">RapidFuzz 85%</text>

  <!-- Arrow -->
  <line x1="365" y1="130" x2="405" y2="130" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Scoring -->
