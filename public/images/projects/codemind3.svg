<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#172554;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg8)" rx="12"/>

  <text x="400" y="40" text-anchor="middle" fill="#93c5fd" font-size="22" font-weight="700">CodeMind3 — Full-Stack Architecture</text>
  <line x1="210" y1="50" x2="590" y2="50" stroke="#3b82f6" stroke-width="2"/>

  <defs><marker id="arr15" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>

  <!-- Frontend -->
  <rect x="80" y="70" width="300" height="130" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="95" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">Frontend (React 18)</text>
  <rect x="100" y="105" width="120" height="35" rx="6" fill="#172554" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="127" text-anchor="middle" fill="#93c5fd" font-size="10">TypeScript</text>
  <rect x="230" y="105" width="130" height="35" rx="6" fill="#172554" stroke="#2563eb" stroke-width="1"/>
  <text x="295" y="127" text-anchor="middle" fill="#93c5fd" font-size="10">TailwindCSS</text>
  <rect x="100" y="148" width="120" height="35" rx="6" fill="#172554" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="170" text-anchor="middle" fill="#93c5fd" font-size="10">Vite Build</text>
  <rect x="230" y="148" width="130" height="35" rx="6" fill="#172554" stroke="#2563eb" stroke-width="1"/>
  <text x="295" y="170" text-anchor="middle" fill="#93c5fd" font-size="10">Code Highlight</text>

  <!-- FSRS Algorithm -->
  <rect x="420" y="70" width="300" height="130" rx="10" fill="#581c87" stroke="#a855f7" stroke-width="1.5"/>
  <text x="570" y="95" text-anchor="middle" fill="#e9d5ff" font-size="15" font-weight="700">FSRS Algorithm</text>
  <text x="570" y="120" text-anchor="middle" fill="#c4b5fd" font-size="11">Free Spaced Repetition Scheduler</text>
  <rect x="440" y="135" width="260" height="50" rx="6" fill="#3b0764" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="157" text-anchor="middle" fill="#ddd6fe" font-size="10">Stability • Difficulty • Retrievability</text>
  <text x="570" y="173" text-anchor="middle" fill="#94a3b8" font-size="9">Optimal Review Scheduling</text>

  <!-- REST API -->
  <path d="M230,200 L230,235" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr15)"/>
  <path d="M570,200 L570,235" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arr16)"/>
  <defs><marker id="arr16" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a855f7"/></marker></defs>

  <rect x="140" y="235" width="520" height="55" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="260" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">REST API Layer</text>
  <text x="400" y="278" text-anchor="middle" fill="#a7f3d0" font-size="10">JWT Authentication • Card CRUD • Review Sessions • Progress Tracking</text>

  <!-- Backend -->
  <path d="M400,290 L400,320" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr17)"/>
  <defs><marker id="arr17" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker></defs>

  <rect x="80" y="320" width="300" height="90" rx="10" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="230" y="345" text-anchor="middle" fill="#fed7aa" font-size="15" font-weight="700">Spring Boot 3 Backend</text>
  <text x="230" y="365" text-anchor="middle" fill="#fde68a" font-size="11">Java 17 • JPA/Hibernate</text>
  <text x="230" y="385" text-anchor="middle" fill="#94a3b8" font-size="10">Security • Validation • Error Handling</text>
  <text x="230" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">Layered Architecture (Controller → Service → Repository)</text>

  <!-- PostgreSQL -->
  <rect x="420" y="320" width="300" height="90" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="345" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">PostgreSQL Database</text>
  <text x="570" y="365" text-anchor="middle" fill="#cbd5e1" font-size="11">Flashcards • Users • Reviews</text>
  <text x="570" y="385" text-anchor="middle" fill="#94a3b8" font-size="10">FSRS Parameters Storage</text>
  <text x="570" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">Flyway Migrations • Indexing</text>

  <!-- Features -->
  <rect x="80" y="435" width="640" height="45" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="150" y="460" fill="#93c5fd" font-size="10" font-weight="600">📝 Code Flashcards</text>
  <text x="295" y="460" fill="#c4b5fd" font-size="10" font-weight="600">🧠 Spaced Repetition</text>
  <text x="445" y="460" fill="#6ee7b7" font-size="10" font-weight="600">📊 Progress Analytics</text>
  <text x="600" y="460" fill="#fed7aa" font-size="10" font-weight="600">🔐 JWT Auth</text>
  <text x="150" y="475" fill="#94a3b8" font-size="8">Syntax Highlighting</text>
  <text x="295" y="475" fill="#94a3b8" font-size="8">FSRS Algorithm</text>
  <text x="445" y="475" fill="#94a3b8" font-size="8">Learning Dashboard</text>
  <text x="600" y="475" fill="#94a3b8" font-size="8">Secure Access</text>
</svg>
