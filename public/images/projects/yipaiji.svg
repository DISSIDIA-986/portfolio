<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ccfbf1" font-size="22" font-weight="700">YiPaiJi Auction Platform — Architecture</text>
  <line x1="220" y1="50" x2="580" y2="50" stroke="url(#accent)" stroke-width="2"/>

  <!-- Frontend -->
  <rect x="300" y="65" width="200" height="45" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="87" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">React SPA</text>
  <text x="400" y="103" text-anchor="middle" fill="#5eead4" font-size="10">Ant Design • WebSocket Client</text>

  <!-- Arrow to Gateway -->
  <line x1="400" y1="110" x2="400" y2="140" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API Gateway -->
  <rect x="250" y="140" width="300" height="45" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="162" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Spring Cloud Gateway</text>
  <text x="400" y="178" text-anchor="middle" fill="#5eead4" font-size="10">Load Balancing • Rate Limiting • Auth</text>

  <!-- Arrows to microservices -->
  <line x1="300" y1="185" x2="130" y2="225" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="185" x2="310" y2="225" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="185" x2="490" y2="225" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="185" x2="670" y2="225" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Auction Service -->
  <rect x="40" y="225" width="180" height="50" rx="8" fill="#7c3aed" fill-opacity="0.7" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="248" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Auction Service</text>
  <text x="130" y="265" text-anchor="middle" fill="#c4b5fd" font-size="10">Bid Processing • Rules</text>

  <!-- User Service -->
  <rect x="230" y="225" width="160" height="50" rx="8" fill="#7c3aed" fill-opacity="0.7" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="310" y="248" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">User Service</text>
  <text x="310" y="265" text-anchor="middle" fill="#c4b5fd" font-size="10">Auth • Profile</text>

  <!-- Payment Service -->
  <rect x="410" y="225" width="160" height="50" rx="8" fill="#7c3aed" fill-opacity="0.7" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="490" y="248" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Payment Service</text>
  <text x="490" y="265" text-anchor="middle" fill="#c4b5fd" font-size="10">Alipay • WeChat Pay</text>

  <!-- Notification Service -->
  <rect x="580" y="225" width="180" height="50" rx="8" fill="#7c3aed" fill-opacity="0.7" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="670" y="248" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Notification Service</text>
  <text x="670" y="265" text-anchor="middle" fill="#c4b5fd" font-size="10">SMS • Push • Email</text>

  <!-- Arrows to infra -->
  <line x1="130" y1="275" x2="130" y2="320" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="275" x2="350" y2="320" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="275" x2="560" y2="320" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="275" x2="670" y2="320" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WebSocket -->
  <rect x="40" y="320" width="180" height="48" rx="8" fill="#0891b2" fill-opacity="0.6" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="342" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">WebSocket Server</text>
  <text x="130" y="358" text-anchor="middle" fill="#a5f3fc" font-size="10">Real-Time Bid Updates</text>

  <!-- Redis -->
  <rect x="270" y="320" width="160" height="48" rx="8" fill="#dc2626" fill-opacity="0.5" stroke="#f87171" stroke-width="1.5"/>
  <text x="350" y="342" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Redis Cluster</text>
  <text x="350" y="358" text-anchor="middle" fill="#fca5a5" font-size="10">Bid State • Session Cache</text>

  <!-- RocketMQ -->
  <rect x="480" y="320" width="160" height="48" rx="8" fill="#059669" fill-opacity="0.5" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="342" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">RocketMQ</text>
  <text x="560" y="358" text-anchor="middle" fill="#a7f3d0" font-size="10">Async Processing</text>

  <!-- MySQL -->
  <rect x="590" y="320" width="170" height="48" rx="8" fill="#d97706" fill-opacity="0.5" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="675" y="342" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">MySQL</text>
  <text x="675" y="358" text-anchor="middle" fill="#fde68a" font-size="10">Persistent Storage</text>

  <!-- Key features bar -->
  <rect x="40" y="395" width="720" height="80" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
  <text x="120" y="420" fill="#06b6d4" font-size="11" font-weight="600">⚡ High Concurrency</text>
  <text x="300" y="420" fill="#8b5cf6" font-size="11" font-weight="600">🔄 Real-Time Bidding</text>
  <text x="490" y="420" fill="#06b6d4" font-size="11" font-weight="600">📨 Async Processing</text>
  <text x="660" y="420" fill="#8b5cf6" font-size="11" font-weight="600">💾 Distributed Cache</text>
  <text x="120" y="440" fill="#94a3b8" font-size="9">1000+ concurrent bidders</text>
  <text x="300" y="440" fill="#94a3b8" font-size="9">WebSocket push updates</text>
  <text x="490" y="440" fill="#94a3b8" font-size="9">RocketMQ event queue</text>
  <text x="660" y="440" fill="#94a3b8" font-size="9">Redis cluster caching</text>
  <text x="120" y="460" fill="#64748b" font-size="8">Spring Boot • Spring Cloud</text>
  <text x="300" y="460" fill="#64748b" font-size="8">Millisecond latency</text>
  <text x="490" y="460" fill="#64748b" font-size="8">Decoupled services</text>
  <text x="660" y="460" fill="#64748b" font-size="8">Session + bid state</text>
</svg>
