<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg10)" rx="12"/>

  <text x="400" y="40" text-anchor="middle" fill="#38bdf8" font-size="22" font-weight="700">AOS-AAIP Immigration Draw Analysis</text>
  <line x1="180" y1="50" x2="620" y2="50" stroke="#0284c7" stroke-width="2"/>

  <defs><marker id="arr20" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0284c7"/></marker></defs>

  <!-- Data Collection -->
  <rect x="60" y="70" width="280" height="70" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="95" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">1. Web Scraper</text>
  <text x="200" y="115" text-anchor="middle" fill="#cbd5e1" font-size="10">Alberta Immigration Draw Data</text>
  <text x="200" y="128" text-anchor="middle" fill="#94a3b8" font-size="9">AOS / ATP Stream-Specific Collection</text>

  <path d="M340,105 L380,105" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr20)"/>

  <!-- Data Pipeline -->
  <rect x="385" y="70" width="350" height="70" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="560" y="95" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">2. Data Pipeline</text>
  <text x="560" y="115" text-anchor="middle" fill="#cbd5e1" font-size="10">Pandas ETL • Feature Engineering</text>
  <text x="560" y="128" text-anchor="middle" fill="#94a3b8" font-size="9">Data Leakage Prevention • Temporal Validation</text>

  <!-- ML Models -->
  <path d="M400,140 L400,170" stroke="#0284c7" stroke-width="1.5" fill="none" marker-end="url(#arr20)"/>

  <rect x="80" y="170" width="640" height="80" rx="10" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="195" text-anchor="middle" fill="#fde68a" font-size="15" font-weight="700">3. Multi-Model Comparison</text>

  <rect x="110" y="205" width="150" height="35" rx="6" fill="#451a03" stroke="#b45309" stroke-width="1"/>
  <text x="185" y="226" text-anchor="middle" fill="#fde68a" font-size="11">Linear Regression</text>

  <rect x="280" y="205" width="150" height="35" rx="6" fill="#451a03" stroke="#b45309" stroke-width="1"/>
  <text x="355" y="226" text-anchor="middle" fill="#fde68a" font-size="11">Random Forest</text>

  <rect x="450" y="205" width="120" height="35" rx="6" fill="#451a03" stroke="#b45309" stroke-width="1"/>
  <text x="510" y="226" text-anchor="middle" fill="#fde68a" font-size="11">XGBoost</text>

  <rect x="590" y="205" width="110" height="35" rx="6" fill="#451a03" stroke="#b45309" stroke-width="1"/>
  <text x="645" y="226" text-anchor="middle" fill="#fde68a" font-size="11">Ensemble</text>

  <!-- Validation -->
  <path d="M400,250 L400,280" stroke="#0284c7" stroke-width="1.5" fill="none" marker-end="url(#arr20)"/>

  <rect x="120" y="280" width="260" height="65" rx="10" fill="#4c1d95" stroke="#a855f7" stroke-width="1.5"/>
  <text x="250" y="305" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">4. Rolling Validation</text>
  <text x="250" y="325" text-anchor="middle" fill="#ddd6fe" font-size="10">Block Bootstrap CI</text>
  <text x="250" y="338" text-anchor="middle" fill="#94a3b8" font-size="9">Temporal Cross-Validation</text>

  <rect x="420" y="280" width="260" height="65" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="550" y="305" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">5. Forecasting Output</text>
  <text x="550" y="325" text-anchor="middle" fill="#a7f3d0" font-size="10">Confidence Intervals</text>
  <text x="550" y="338" text-anchor="middle" fill="#94a3b8" font-size="9">Next Draw Score Prediction</text>

  <!-- Policy Monitor -->
  <path d="M400,345 L400,375" stroke="#0284c7" stroke-width="1.5" fill="none" marker-end="url(#arr20)"/>

  <rect x="140" y="375" width="520" height="55" rx="10" fill="#1e3a5f" stroke="#0284c7" stroke-width="1.5"/>
  <text x="400" y="398" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">6. Policy Stability Monitor</text>
  <text x="400" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">Stream-Specific Hyperparameter Tuning • 4+ Visualizations • 3.7K Lines Production Python</text>

  <!-- Tech badges -->
  <rect x="100" y="450" width="600" height="35" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="160" y="472" fill="#38bdf8" font-size="10" font-weight="600">Python</text>
  <text x="240" y="472" fill="#fde68a" font-size="10" font-weight="600">scikit-learn</text>
  <text x="340" y="472" fill="#c4b5fd" font-size="10" font-weight="600">XGBoost</text>
  <text x="430" y="472" fill="#6ee7b7" font-size="10" font-weight="600">Pandas</text>
  <text x="520" y="472" fill="#93c5fd" font-size="10" font-weight="600">Bootstrap CI</text>
  <text x="630" y="472" fill="#94a3b8" font-size="10" font-weight="600">Web Scraping</text>
</svg>
