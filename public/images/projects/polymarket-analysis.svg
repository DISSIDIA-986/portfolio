<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg7)" rx="12"/>

  <text x="400" y="40" text-anchor="middle" fill="#34d399" font-size="22" font-weight="700">Polymarket Arbitrage — Analysis System</text>
  <line x1="190" y1="50" x2="610" y2="50" stroke="#10b981" stroke-width="2"/>

  <defs><marker id="arr13" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker></defs>

  <!-- Data Sources -->
  <text x="400" y="80" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">36+ Data Sources</text>
  <rect x="40" y="90" width="140" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="110" y="114" text-anchor="middle" fill="#a7f3d0" font-size="10">Polymarket API</text>
  <rect x="190" y="90" width="140" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="260" y="114" text-anchor="middle" fill="#a7f3d0" font-size="10">News Feeds</text>
  <rect x="340" y="90" width="140" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="410" y="114" text-anchor="middle" fill="#a7f3d0" font-size="10">Social Sentiment</text>
  <rect x="490" y="90" width="140" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="560" y="114" text-anchor="middle" fill="#a7f3d0" font-size="10">On-Chain Data</text>
  <rect x="640" y="90" width="120" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="700" y="114" text-anchor="middle" fill="#a7f3d0" font-size="10">Exchange Data</text>

  <!-- Aggregation -->
  <path d="M400,130 L400,160" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr13)"/>
  <rect x="180" y="160" width="440" height="55" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="185" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">Real-Time Data Aggregation Layer</text>
  <text x="400" y="203" text-anchor="middle" fill="#cbd5e1" font-size="10">Redis Cache • Kafka Streams • TimescaleDB Storage</text>

  <!-- AI Engine -->
  <path d="M400,215 L400,245" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr13)"/>
  <rect x="140" y="245" width="520" height="70" rx="10" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="270" text-anchor="middle" fill="#fde68a" font-size="15" font-weight="700">AI Ensemble Decision Engine</text>
  <text x="400" y="290" text-anchor="middle" fill="#fed7aa" font-size="11">Claude API • NautilusTrader • Multi-Model Consensus</text>
  <text x="400" y="305" text-anchor="middle" fill="#94a3b8" font-size="9">Probability Modeling • Market Inefficiency Detection • Arbitrage Identification</text>

  <!-- Risk & Execution -->
  <path d="M300,315 L200,350" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr14)"/>
  <path d="M500,315 L600,350" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr14)"/>
  <defs><marker id="arr14" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f97316"/></marker></defs>

  <rect x="60" y="350" width="280" height="60" rx="10" fill="#4c1d95" stroke="#a855f7" stroke-width="1.5"/>
  <text x="200" y="375" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Risk Management</text>
  <text x="200" y="395" text-anchor="middle" fill="#94a3b8" font-size="10">Position Sizing • Drawdown Limits • Exposure Control</text>

  <rect x="460" y="350" width="280" height="60" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="375" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Strategy Execution</text>
  <text x="600" y="395" text-anchor="middle" fill="#94a3b8" font-size="10">Auto-Trading • Portfolio Rebalancing • P&amp;L Tracking</text>

  <!-- Infrastructure -->
  <rect x="100" y="435" width="600" height="45" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="400" y="455" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">Infrastructure: Kubernetes • Prometheus • Celery Workers</text>
  <text x="400" y="472" text-anchor="middle" fill="#94a3b8" font-size="9">TimescaleDB • Redis • Kafka • Docker Compose</text>
</svg>
