<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ccfbf1" font-size="22" font-weight="700">Vox — Voice-to-Text Pipeline</text>
  <line x1="220" y1="50" x2="580" y2="50" stroke="url(#accent)" stroke-width="2"/>

  <!-- Input Sources -->
  <rect x="140" y="70" width="200" height="50" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="240" y="95" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">CLI Terminal</text>
  <text x="240" y="110" text-anchor="middle" fill="#5eead4" font-size="10">macOS / Linux</text>

  <rect x="460" y="70" width="200" height="50" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="560" y="95" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">iPhone Web</text>
  <text x="560" y="110" text-anchor="middle" fill="#5eead4" font-size="10">Mobile Safari PWA</text>

  <!-- Arrows from inputs to Go Server -->
  <line x1="240" y1="120" x2="400" y2="155" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="120" x2="400" y2="155" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Go Server -->
  <rect x="250" y="155" width="300" height="55" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="180" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Go Server</text>
  <text x="400" y="198" text-anchor="middle" fill="#5eead4" font-size="10">Chi v5 Router • Token Auth • Audio Upload</text>

  <!-- Arrows from Go Server to ASR, AI Correction, Output -->
  <line x1="300" y1="210" x2="170" y2="250" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="210" x2="400" y2="250" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="210" x2="630" y2="250" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ASR Engine (Left) -->
  <rect x="50" y="250" width="240" height="75" rx="8" fill="#0891b2" fill-opacity="0.5" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="170" y="275" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">ASR Transcription</text>
  <text x="170" y="295" text-anchor="middle" fill="#a5f3fc" font-size="10">Primary: Groq Whisper Large v3</text>
  <text x="170" y="310" text-anchor="middle" fill="#67e8f9" font-size="10">Backup: SiliconFlow SenseVoice</text>

  <!-- AI Correction (Center) -->
  <rect x="310" y="250" width="180" height="75" rx="8" fill="#7c3aed" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">AI Text Correction</text>
  <text x="400" y="295" text-anchor="middle" fill="#ddd6fe" font-size="10">Primary: Gemini 2.5 Flash</text>
  <text x="400" y="310" text-anchor="middle" fill="#c4b5fd" font-size="10">Backup: Groq Llama 3.3</text>

  <!-- Output (Right) -->
  <rect x="510" y="250" width="240" height="75" rx="8" fill="#059669" fill-opacity="0.5" stroke="#34d399" stroke-width="1.5"/>
  <text x="630" y="275" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Output &amp; Storage</text>
  <text x="630" y="295" text-anchor="middle" fill="#a7f3d0" font-size="10">Clipboard Auto-Copy</text>
  <text x="630" y="310" text-anchor="middle" fill="#86efac" font-size="10">History • Search • Re-copy</text>

  <!-- Pipeline flow arrows -->
  <line x1="290" y1="287" x2="305" y2="287" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="287" x2="505" y2="287" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pronoun Verification label -->
  <rect x="310" y="335" width="180" height="30" rx="8" fill="#d97706" fill-opacity="0.3" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">Pronoun Verification Step</text>

  <!-- Cloudflare Tunnel -->
  <line x1="400" y1="380" x2="400" y2="400" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="400" width="400" height="50" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="425" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Cloudflare Tunnel</text>
  <text x="400" y="442" text-anchor="middle" fill="#5eead4" font-size="10">Secure Exposure • HTTPS • Zero-Trust Access</text>

  <!-- Feature badges -->
  <text x="100" y="480" fill="#06b6d4" font-size="10" font-weight="600">Go 1.23</text>
  <text x="210" y="480" fill="#8b5cf6" font-size="10" font-weight="600">Groq Whisper</text>
  <text x="340" y="480" fill="#34d399" font-size="10" font-weight="600">Gemini 2.5 Flash</text>
  <text x="490" y="480" fill="#d97706" font-size="10" font-weight="600">Dual Endpoint</text>
  <text x="630" y="480" fill="#06b6d4" font-size="10" font-weight="600">Cloudflare Tunnel</text>
</svg>