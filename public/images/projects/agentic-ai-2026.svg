<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ccfbf1" font-size="20" font-weight="700">AgenticAI2026 — AI Agent Architecture Curriculum</text>
  <line x1="150" y1="50" x2="650" y2="50" stroke="url(#accent)" stroke-width="2"/>
  <text x="400" y="70" text-anchor="middle" fill="#5eead4" font-size="12">Interactive learning curriculum for senior developers</text>

  <!-- Module 1 -->
  <rect x="40" y="100" width="220" height="150" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="150" y="128" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Agent Foundations</text>
  <line x1="80" y1="138" x2="220" y2="138" stroke="#2dd4bf" stroke-width="0.5" opacity="0.5"/>
  <text x="150" y="158" text-anchor="middle" fill="#5eead4" font-size="11">ReAct Pattern</text>
  <text x="150" y="176" text-anchor="middle" fill="#5eead4" font-size="11">Tool Orchestration</text>
  <text x="150" y="194" text-anchor="middle" fill="#5eead4" font-size="11">Planning Loops</text>
  <text x="150" y="212" text-anchor="middle" fill="#5eead4" font-size="11">Memory Systems</text>

  <!-- Module 2 -->
  <rect x="290" y="100" width="220" height="150" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="128" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Multi-Agent Systems</text>
  <line x1="330" y1="138" x2="470" y2="138" stroke="#2dd4bf" stroke-width="0.5" opacity="0.5"/>
  <text x="400" y="158" text-anchor="middle" fill="#5eead4" font-size="11">Agent Communication</text>
  <text x="400" y="176" text-anchor="middle" fill="#5eead4" font-size="11">Task Delegation</text>
  <text x="400" y="194" text-anchor="middle" fill="#5eead4" font-size="11">Consensus Protocols</text>
  <text x="400" y="212" text-anchor="middle" fill="#5eead4" font-size="11">Error Recovery</text>

  <!-- Module 3 -->
  <rect x="540" y="100" width="220" height="150" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Production Deploy</text>
  <line x1="580" y1="138" x2="720" y2="138" stroke="#2dd4bf" stroke-width="0.5" opacity="0.5"/>
  <text x="650" y="158" text-anchor="middle" fill="#5eead4" font-size="11">MCP Integration</text>
  <text x="650" y="176" text-anchor="middle" fill="#5eead4" font-size="11">Reliability Patterns</text>
  <text x="650" y="194" text-anchor="middle" fill="#5eead4" font-size="11">Monitoring + Eval</text>
  <text x="650" y="212" text-anchor="middle" fill="#5eead4" font-size="11">Cost Optimization</text>

  <!-- Connection lines between modules -->
  <line x1="260" y1="175" x2="290" y2="175" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="510" y1="175" x2="540" y2="175" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Case Studies Row -->
  <text x="400" y="290" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Real-World Case Studies</text>
  <line x1="250" y1="298" x2="550" y2="298" stroke="url(#accent)" stroke-width="1"/>

  <rect x="40" y="315" width="170" height="70" rx="6" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="125" y="340" text-anchor="middle" fill="#2dd4bf" font-size="12" font-weight="600">JobPilot AI</text>
  <text x="125" y="358" text-anchor="middle" fill="#5eead4" font-size="10">5 LLM Providers</text>
  <text x="125" y="372" text-anchor="middle" fill="#5eead4" font-size="10">Agentic Pipeline</text>

  <rect x="230" y="315" width="170" height="70" rx="6" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="315" y="340" text-anchor="middle" fill="#2dd4bf" font-size="12" font-weight="600">Industry-AI-Flow</text>
  <text x="315" y="358" text-anchor="middle" fill="#5eead4" font-size="10">RAG + Multi-Agent</text>
  <text x="315" y="372" text-anchor="middle" fill="#5eead4" font-size="10">Enterprise Workflow</text>

  <rect x="420" y="315" width="170" height="70" rx="6" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="505" y="340" text-anchor="middle" fill="#2dd4bf" font-size="12" font-weight="600">AI Ops Control Room</text>
  <text x="505" y="358" text-anchor="middle" fill="#5eead4" font-size="10">LLM-as-Judge</text>
  <text x="505" y="372" text-anchor="middle" fill="#5eead4" font-size="10">Quality Evaluation</text>

  <rect x="610" y="315" width="150" height="70" rx="6" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="685" y="340" text-anchor="middle" fill="#2dd4bf" font-size="12" font-weight="600">Claude-Code-Remote</text>
  <text x="685" y="358" text-anchor="middle" fill="#5eead4" font-size="10">Multi-Channel</text>
  <text x="685" y="372" text-anchor="middle" fill="#5eead4" font-size="10">Agent Control</text>

  <!-- Target Audience -->
  <rect x="150" y="420" width="500" height="50" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1"/>
  <text x="400" y="445" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">For Senior Developers Transitioning to AI Engineering</text>
  <text x="400" y="462" text-anchor="middle" fill="#5eead4" font-size="10">Interactive MDX + Code Exercises + Architecture Diagrams + Production Patterns</text>
</svg>
