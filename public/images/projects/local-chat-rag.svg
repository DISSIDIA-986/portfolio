<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#ccfbf1" font-size="22" font-weight="700">Local Chat RAG — Architecture</text>
  <line x1="250" y1="55" x2="550" y2="55" stroke="url(#accent1)" stroke-width="2"/>

  <!-- User Layer -->
  <rect x="280" y="75" width="240" height="50" rx="8" fill="url(#card1)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">React + TypeScript UI</text>
  <text x="400" y="120" text-anchor="middle" fill="#5eead4" font-size="10">Zustand State • Chakra UI</text>

  <!-- Arrow -->
  <line x1="400" y1="125" x2="400" y2="155" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2dd4bf"/></marker></defs>

  <!-- API Layer -->
  <rect x="220" y="155" width="360" height="55" rx="8" fill="url(#card1)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="180" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">FastAPI Backend</text>
  <text x="400" y="198" text-anchor="middle" fill="#5eead4" font-size="10">SQLAlchemy • REST API • Document Processing</text>

  <!-- Branch arrows -->
  <line x1="310" y1="210" x2="200" y2="250" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="210" x2="400" y2="250" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="210" x2="600" y2="250" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LangChain -->
  <rect x="80" y="250" width="220" height="55" rx="8" fill="url(#card1)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="190" y="275" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">LangChain Pipeline</text>
  <text x="190" y="293" text-anchor="middle" fill="#5eead4" font-size="10">Retrieval Chain • QA Chain</text>

  <!-- ChromaDB -->
  <rect x="320" y="250" width="160" height="55" rx="8" fill="#7c3aed" fill-opacity="0.7" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">ChromaDB</text>
  <text x="400" y="293" text-anchor="middle" fill="#c4b5fd" font-size="10">Vector Store</text>

  <!-- Ollama -->
  <rect x="500" y="250" width="220" height="55" rx="8" fill="#0891b2" fill-opacity="0.6" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="610" y="275" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Ollama (Local LLM)</text>
  <text x="610" y="293" text-anchor="middle" fill="#a5f3fc" font-size="10">100% Private • No Cloud</text>

  <!-- Bottom flow -->
  <line x1="190" y1="305" x2="190" y2="345" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="305" x2="400" y2="345" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="305" x2="610" y2="345" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Document Processing -->
  <rect x="80" y="345" width="220" height="50" rx="8" fill="#059669" fill-opacity="0.5" stroke="#34d399" stroke-width="1.5"/>
  <text x="190" y="370" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Document Processing</text>
  <text x="190" y="386" text-anchor="middle" fill="#a7f3d0" font-size="10">PDF • TXT • DOCX Upload</text>

  <!-- Embeddings -->
  <rect x="320" y="345" width="160" height="50" rx="8" fill="#059669" fill-opacity="0.5" stroke="#34d399" stroke-width="1.5"/>
  <text x="400" y="370" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">Embeddings</text>
  <text x="400" y="386" text-anchor="middle" fill="#a7f3d0" font-size="10">Chunking • Indexing</text>

  <!-- Response -->
  <rect x="500" y="345" width="220" height="50" rx="8" fill="#059669" fill-opacity="0.5" stroke="#34d399" stroke-width="1.5"/>
  <text x="610" y="370" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="600">AI Response</text>
  <text x="610" y="386" text-anchor="middle" fill="#a7f3d0" font-size="10">Source Citations • Streaming</text>

  <!-- Key features bar -->
  <rect x="80" y="420" width="640" height="55" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
  <text x="120" y="445" fill="#06b6d4" font-size="11" font-weight="600">🔒 Privacy-First</text>
  <text x="260" y="445" fill="#8b5cf6" font-size="11" font-weight="600">📄 Multi-Format</text>
  <text x="390" y="445" fill="#06b6d4" font-size="11" font-weight="600">🔍 Source Citations</text>
  <text x="540" y="445" fill="#8b5cf6" font-size="11" font-weight="600">⚡ Real-Time Chat</text>
  <text x="120" y="465" fill="#94a3b8" font-size="9">Runs 100% locally</text>
  <text x="260" y="465" fill="#94a3b8" font-size="9">PDF, TXT, DOCX</text>
  <text x="390" y="465" fill="#94a3b8" font-size="9">Traceable answers</text>
  <text x="540" y="465" fill="#94a3b8" font-size="9">Streaming responses</text>
</svg>
