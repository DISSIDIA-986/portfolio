<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ccfbf1" font-size="22" font-weight="700">AKM — API Key Manager Architecture</text>
  <line x1="200" y1="50" x2="600" y2="50" stroke="url(#accent)" stroke-width="2"/>

  <!-- Top: Local Scripts & Applications -->
  <rect x="200" y="65" width="400" height="55" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Local Scripts &amp; Applications</text>
  <text x="400" y="106" text-anchor="middle" fill="#5eead4" font-size="10">CLI Tools • AI Agents • Dev Scripts • IDE Plugins</text>

  <!-- Arrow: Scripts to Daemon -->
  <line x1="400" y1="120" x2="400" y2="155" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Middle: AKM Daemon -->
  <rect x="220" y="155" width="360" height="65" rx="8" fill="#0891b2" fill-opacity="0.6" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="182" text-anchor="middle" fill="#ccfbf1" font-size="16" font-weight="700">AKM Daemon</text>
  <text x="400" y="200" text-anchor="middle" fill="#a5f3fc" font-size="11">Go Binary • Background Service • Unix Socket API</text>
  <text x="400" y="213" text-anchor="middle" fill="#67e8f9" font-size="9">GET /keys/{provider} • SET • LIST • ROTATE • HEALTH</text>

  <!-- Arrow: Daemon to Encryption (left) -->
  <line x1="220" y1="188" x2="155" y2="188" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow: Daemon to Keychain (right) -->
  <line x1="580" y1="188" x2="645" y2="188" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left: AES-256-GCM Encryption -->
  <rect x="20" y="155" width="135" height="65" rx="8" fill="#7c3aed" fill-opacity="0.7" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="87" y="180" text-anchor="middle" fill="#ccfbf1" font-size="12" font-weight="600">AES-256-GCM</text>
  <text x="87" y="194" text-anchor="middle" fill="#c4b5fd" font-size="9">Encryption Layer</text>
  <text x="87" y="210" text-anchor="middle" fill="#c4b5fd" font-size="9">At-Rest Protection</text>

  <!-- Right: macOS Keychain -->
  <rect x="645" y="155" width="135" height="65" rx="8" fill="#059669" fill-opacity="0.6" stroke="#34d399" stroke-width="1.5"/>
  <text x="712" y="178" text-anchor="middle" fill="#ccfbf1" font-size="12" font-weight="600">macOS Keychain</text>
  <text x="712" y="194" text-anchor="middle" fill="#a7f3d0" font-size="9">Master Key Store</text>
  <text x="712" y="210" text-anchor="middle" fill="#a7f3d0" font-size="9">Biometric Unlock</text>

  <!-- Arrow: Daemon to Key Store -->
  <line x1="400" y1="220" x2="400" y2="260" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Key Store / Config -->
  <rect x="250" y="260" width="300" height="50" rx="8" fill="url(#card)" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="285" text-anchor="middle" fill="#ccfbf1" font-size="14" font-weight="600">Encrypted Key Vault</text>
  <text x="400" y="300" text-anchor="middle" fill="#5eead4" font-size="10">~/.akm/keys.enc • Provider Configs • Key Rotation</text>

  <!-- Arrows: Key Store to Provider Row -->
  <line x1="400" y1="310" x2="400" y2="345" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Provider Row Label -->
  <text x="400" y="358" text-anchor="middle" fill="#ccfbf1" font-size="12" font-weight="600">Supported AI Providers</text>

  <!-- 7 AI Provider boxes -->
  <!-- OpenAI -->
  <rect x="30" y="370" width="95" height="45" rx="8" fill="#059669" fill-opacity="0.5" stroke="#34d399" stroke-width="1"/>
  <text x="77" y="391" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">OpenAI</text>
  <text x="77" y="406" text-anchor="middle" fill="#a7f3d0" font-size="8">GPT-4o / o1</text>

  <!-- Anthropic -->
  <rect x="135" y="370" width="95" height="45" rx="8" fill="#7c3aed" fill-opacity="0.5" stroke="#a78bfa" stroke-width="1"/>
  <text x="182" y="391" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">Anthropic</text>
  <text x="182" y="406" text-anchor="middle" fill="#c4b5fd" font-size="8">Claude</text>

  <!-- Gemini -->
  <rect x="240" y="370" width="95" height="45" rx="8" fill="#0891b2" fill-opacity="0.5" stroke="#22d3ee" stroke-width="1"/>
  <text x="287" y="391" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">Gemini</text>
  <text x="287" y="406" text-anchor="middle" fill="#a5f3fc" font-size="8">Google AI</text>

  <!-- Groq -->
  <rect x="345" y="370" width="95" height="45" rx="8" fill="#d97706" fill-opacity="0.4" stroke="#fbbf24" stroke-width="1"/>
  <text x="392" y="391" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">Groq</text>
  <text x="392" y="406" text-anchor="middle" fill="#fde68a" font-size="8">Ultra-Fast</text>

  <!-- DeepSeek -->
  <rect x="450" y="370" width="95" height="45" rx="8" fill="#059669" fill-opacity="0.5" stroke="#34d399" stroke-width="1"/>
  <text x="497" y="391" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">DeepSeek</text>
  <text x="497" y="406" text-anchor="middle" fill="#a7f3d0" font-size="8">R1 / V3</text>

  <!-- Qwen -->
  <rect x="555" y="370" width="95" height="45" rx="8" fill="#0891b2" fill-opacity="0.5" stroke="#22d3ee" stroke-width="1"/>
  <text x="602" y="391" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">Qwen</text>
  <text x="602" y="406" text-anchor="middle" fill="#a5f3fc" font-size="8">Alibaba</text>

  <!-- GLM -->
  <rect x="660" y="370" width="95" height="45" rx="8" fill="#7c3aed" fill-opacity="0.5" stroke="#a78bfa" stroke-width="1"/>
  <text x="707" y="391" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">GLM</text>
  <text x="707" y="406" text-anchor="middle" fill="#c4b5fd" font-size="8">Zhipu AI</text>

  <!-- Key features bar -->
  <rect x="60" y="435" width="680" height="50" rx="8" fill="#042f2e" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
  <text x="130" y="457" fill="#06b6d4" font-size="11" font-weight="600">Daemon Mode</text>
  <text x="280" y="457" fill="#8b5cf6" font-size="11" font-weight="600">Unix Socket IPC</text>
  <text x="440" y="457" fill="#06b6d4" font-size="11" font-weight="600">Key Rotation</text>
  <text x="590" y="457" fill="#8b5cf6" font-size="11" font-weight="600">Zero Config</text>
  <text x="130" y="474" fill="#94a3b8" font-size="9">Background service</text>
  <text x="280" y="474" fill="#94a3b8" font-size="9">Secure local transport</text>
  <text x="440" y="474" fill="#94a3b8" font-size="9">Auto key expiry</text>
  <text x="590" y="474" fill="#94a3b8" font-size="9">Sensible defaults</text>
</svg>