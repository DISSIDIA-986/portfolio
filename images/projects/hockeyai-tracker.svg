<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)" rx="12"/>

  <text x="400" y="40" text-anchor="middle" fill="#67e8f9" font-size="22" font-weight="700">HockeyAI-Tracker — CV Pipeline</text>
  <line x1="220" y1="50" x2="580" y2="50" stroke="#06b6d4" stroke-width="2"/>

  <!-- Video Input -->
  <rect x="40" y="75" width="180" height="80" rx="10" fill="#0e7490" fill-opacity="0.4" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="105" text-anchor="middle" fill="#67e8f9" font-size="14" font-weight="700">Video Input</text>
  <text x="130" y="125" text-anchor="middle" fill="#a5f3fc" font-size="10">Hockey Game Footage</text>
  <text x="130" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">30 FPS Processing</text>

  <path d="M220,115 L260,115" stroke="#22d3ee" stroke-width="1.5" fill="none" marker-end="url(#arr4)"/>
  <defs><marker id="arr4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22d3ee"/></marker></defs>

  <!-- YOLOv8 Detection -->
  <rect x="265" y="75" width="260" height="80" rx="10" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="395" y="100" text-anchor="middle" fill="#fed7aa" font-size="14" font-weight="700">YOLOv8 Object Detection</text>
  <text x="395" y="120" text-anchor="middle" fill="#fde68a" font-size="10">Player Detection • Puck Detection</text>
  <text x="395" y="138" text-anchor="middle" fill="#94a3b8" font-size="9">Ultralytics • Real-Time Inference</text>

  <path d="M525,115 L570,115" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr5)"/>
  <defs><marker id="arr5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f97316"/></marker></defs>

  <!-- BoT-SORT -->
  <rect x="575" y="75" width="190" height="80" rx="10" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="670" y="100" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">BoT-SORT Tracker</text>
  <text x="670" y="120" text-anchor="middle" fill="#ddd6fe" font-size="10">Multi-Object Tracking</text>
  <text x="670" y="138" text-anchor="middle" fill="#94a3b8" font-size="9">ID Assignment • Re-ID</text>

  <!-- Middle Processing -->
  <path d="M395,155 L395,185" stroke="#22d3ee" stroke-width="1.5" fill="none" marker-end="url(#arr4)"/>
  <path d="M670,155 L670,185" stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arr6)"/>
  <defs><marker id="arr6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a78bfa"/></marker></defs>

  <!-- Processing Modules -->
  <rect x="80" y="190" width="200" height="70" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="215" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">PlayerTracker</text>
  <text x="180" y="235" text-anchor="middle" fill="#cbd5e1" font-size="10">Team Classification</text>
  <text x="180" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">Jersey Color Analysis</text>

  <rect x="300" y="190" width="200" height="70" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="215" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">PuckTrackerV2</text>
  <text x="400" y="235" text-anchor="middle" fill="#cbd5e1" font-size="10">Small Object Tracking</text>
  <text x="400" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">Trajectory Prediction</text>

  <rect x="520" y="190" width="230" height="70" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="635" y="215" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">HockeyAI Orchestrator</text>
  <text x="635" y="235" text-anchor="middle" fill="#cbd5e1" font-size="10">Multi-Module Coordination</text>
  <text x="635" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">3.3K Lines • Production Code</text>

  <!-- Output Section -->
  <path d="M400,260 L400,300" stroke="#22d3ee" stroke-width="1.5" fill="none" marker-end="url(#arr4)"/>

  <rect x="120" y="305" width="250" height="70" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="245" y="330" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">Annotated Video Output</text>
  <text x="245" y="350" text-anchor="middle" fill="#bbf7d0" font-size="10">Bounding Boxes • Player IDs</text>
  <text x="245" y="363" text-anchor="middle" fill="#94a3b8" font-size="9">Team-Colored Annotations</text>

  <rect x="420" y="305" width="250" height="70" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="545" y="330" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">CSV Statistics Export</text>
  <text x="545" y="350" text-anchor="middle" fill="#bbf7d0" font-size="10">Player Positions • Movement Data</text>
  <text x="545" y="363" text-anchor="middle" fill="#94a3b8" font-size="9">Frame-by-Frame Analytics</text>

  <!-- Tech badges -->
  <rect x="80" y="405" width="640" height="70" rx="10" fill="#0c1222" stroke="#1e3a5f" stroke-width="1"/>
  <text x="400" y="428" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Tech Stack</text>
  <rect x="110" y="438" width="80" height="24" rx="12" fill="#7c2d12" stroke="#f97316" stroke-width="1"/>
  <text x="150" y="454" text-anchor="middle" fill="#fed7aa" font-size="10">YOLOv8</text>
  <rect x="200" y="438" width="80" height="24" rx="12" fill="#0e7490" stroke="#22d3ee" stroke-width="1"/>
  <text x="240" y="454" text-anchor="middle" fill="#a5f3fc" font-size="10">OpenCV</text>
  <rect x="290" y="438" width="80" height="24" rx="12" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="330" y="454" text-anchor="middle" fill="#c4b5fd" font-size="10">BoT-SORT</text>
  <rect x="380" y="438" width="80" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="420" y="454" text-anchor="middle" fill="#93c5fd" font-size="10">NumPy</text>
  <rect x="470" y="438" width="90" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="515" y="454" text-anchor="middle" fill="#93c5fd" font-size="10">Ultralytics</text>
  <rect x="570" y="438" width="100" height="24" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="620" y="454" text-anchor="middle" fill="#86efac" font-size="10">Apple MPS</text>
</svg>
