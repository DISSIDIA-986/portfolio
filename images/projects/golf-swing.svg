<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#052e16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14532d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)" rx="12"/>

  <text x="400" y="40" text-anchor="middle" fill="#86efac" font-size="22" font-weight="700">Golf Swing Analyzer — iOS CV App</text>
  <line x1="210" y1="50" x2="590" y2="50" stroke="#22c55e" stroke-width="2"/>

  <defs><marker id="arr8" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker></defs>

  <!-- Camera Input -->
  <rect x="60" y="75" width="180" height="120" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="150" y="100" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">Camera Input</text>
  <rect x="80" y="110" width="140" height="70" rx="6" fill="#022c22" stroke="#065f46" stroke-width="1"/>
  <text x="150" y="140" text-anchor="middle" fill="#34d399" font-size="11">📷 Live Feed</text>
  <text x="150" y="160" text-anchor="middle" fill="#94a3b8" font-size="9">30 FPS • iOS 17+</text>
  <text x="150" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">Video Import Support</text>

  <path d="M240,135 L290,135" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arr8)"/>

  <!-- Vision Framework -->
  <rect x="295" y="75" width="210" height="120" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">Apple Vision Framework</text>
  <text x="400" y="120" text-anchor="middle" fill="#cbd5e1" font-size="11">Pose Detection</text>
  <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-size="10">17 Body Keypoints</text>
  <text x="400" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">Joint Angle Calculation</text>
  <text x="400" y="176" text-anchor="middle" fill="#94a3b8" font-size="10">Real-time Processing</text>

  <path d="M505,135 L555,135" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr9)"/>
  <defs><marker id="arr9" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>

  <!-- Metrics Calculator -->
  <rect x="560" y="75" width="200" height="120" rx="10" fill="#581c87" stroke="#a855f7" stroke-width="1.5"/>
  <text x="660" y="100" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">Swing Analyzer</text>
  <text x="660" y="120" text-anchor="middle" fill="#c4b5fd" font-size="11">7 Biomechanical Metrics</text>
  <text x="660" y="140" text-anchor="middle" fill="#94a3b8" font-size="10">Hip Rotation • Spine Angle</text>
  <text x="660" y="155" text-anchor="middle" fill="#94a3b8" font-size="10">Weight Transfer • Tempo</text>
  <text x="660" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">Follow Through</text>

  <!-- Issue Detection -->
  <path d="M400,195 L400,235" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr8)"/>

  <rect x="120" y="240" width="560" height="75" rx="10" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="265" text-anchor="middle" fill="#fed7aa" font-size="15" font-weight="700">11 Issue Detection Types</text>
  <text x="200" y="290" fill="#fde68a" font-size="10">▪ Sway</text>
  <text x="280" y="290" fill="#fde68a" font-size="10">▪ Early Extension</text>
  <text x="410" y="290" fill="#fde68a" font-size="10">▪ Over-the-Top</text>
  <text x="550" y="290" fill="#fde68a" font-size="10">▪ Casting</text>
  <text x="200" y="305" fill="#94a3b8" font-size="9">▪ Chicken Wing  ▪ Loss of Posture  ▪ Reverse Spine  ▪ Sliding  ▪ Swaying  ▪ Hanging Back  ▪ Early Release</text>

  <!-- Scoring -->
  <path d="M400,315 L400,350" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr8)"/>

  <rect x="200" y="355" width="400" height="70" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="380" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="700">Swing Score: 0 — 100</text>
  <text x="400" y="400" text-anchor="middle" fill="#a7f3d0" font-size="11">Detailed Feedback • Improvement Suggestions</text>
  <text x="400" y="415" text-anchor="middle" fill="#94a3b8" font-size="10">SwiftData Persistence • History Tracking</text>

  <!-- Tech badges -->
  <rect x="110" y="445" width="90" height="28" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="155" y="463" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">SwiftUI</text>
  <rect x="210" y="445" width="120" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="270" y="463" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Vision Framework</text>
  <rect x="340" y="445" width="100" height="28" rx="14" fill="#581c87" stroke="#a855f7" stroke-width="1"/>
  <text x="390" y="463" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Pose Detection</text>
  <rect x="450" y="445" width="90" height="28" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="495" y="463" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">SwiftData</text>
  <rect x="550" y="445" width="90" height="28" rx="14" fill="#7c2d12" stroke="#f97316" stroke-width="1"/>
  <text x="595" y="463" text-anchor="middle" fill="#fed7aa" font-size="10" font-weight="600">iOS 17+</text>
</svg>
